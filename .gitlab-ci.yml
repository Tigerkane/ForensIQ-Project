stages:
  - format
  - lint
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - .cache/pip
    - .npm/
    - frontend/node_modules/
    - backend/venv/

format_backend:
  stage: format
  image: python:3.12
  script:
    - cd backend
    - pip install ruff
    - ruff format --check .

lint_backend:
  stage: lint
  image: python:3.12
  script:
    - cd backend
    - pip install ruff bandit
    - ruff check .
    - bandit -c pyproject.toml -r .

type_check_backend:
  stage: type_check
  image: python:3.12
  script:
    - cd backend
    - pip install mypy pydantic fastapi sqlalchemy
    - mypy .

security_python:
  stage: test
  image: python:3.12
  script:
    - pip install uv semgrep
    - cd backend
    - uv audit
    - cd ..
    - semgrep scan --config auto --error

security_node:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm audit
    - npm install -g @commitlint/cli @commitlint/config-conventional
    - cd ..
    - |
      echo "module.exports = {extends: ['@commitlint/config-conventional']}" > commitlint.config.js
    - commitlint --from HEAD~1

secrets_scan:
  stage: test
  image: zricethezav/gitleaks
  script:
    - gitleaks detect --source . -v

test_and_coverage_backend:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install -r requirements.txt pytest pytest-cov
    - pytest --cov=./ --cov-fail-under=80

coverage_report:
  stage: coverage
  image: python:3.12
  script:
    - echo "Coverage stage complete."

