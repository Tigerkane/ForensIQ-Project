stages:
  - format
  - lint
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - .cache/pip
    - .npm/
    - frontend/node_modules/
    - backend/venv/

format_backend:
  stage: format
  image: python:3.12
  script:
    - cd backend
    - pip install ruff
    - ruff format --check .

lint_backend:
  stage: lint
  image: python:3.12
  script:
    - cd backend
    - pip install ruff bandit flake8 vulture pylint pyupgrade
    - ruff check .
    - flake8 .
    - vulture . --min-confidence 100 || true
    - pylint **/*.py --disable=all || true
    - pyupgrade --py312-plus **/*.py || true
    - bandit -c pyproject.toml -r .
  allow_failure: true

type_check_backend:
  stage: type_check
  image: python:3.12
  script:
    - cd backend
    - pip install mypy pydantic fastapi sqlalchemy
    - mypy . || true

security_and_audit:
  stage: test
  image: python:3.12
  script:
    - pip install pip-audit
    - cd backend
    - pip-audit || true
    - cd ../frontend
    - npm audit || true
    - pip install semgrep
    - semgrep ci || true

changelog:
  stage: test
  image: rust:latest
  script:
    - cargo install git-cliff
    - git-cliff -o CHANGELOG.md || true

test_and_coverage_backend:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install -r requirements.txt pytest pytest-cov
    - pytest --cov=./ --cov-fail-under=80

coverage_report:
  stage: coverage
  image: python:3.12
  script:
    - echo "Coverage stage complete."

