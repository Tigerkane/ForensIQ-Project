stages:
  - lint
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - .cache/pip
    - .npm/
    - frontend/node_modules/
    - backend/venv/

lint_backend:
  stage: lint
  image: python:3.12
  script:
    - cd backend
    - pip install flake8
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
  allow_failure: true

lint_frontend:
  stage: lint
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run lint
  allow_failure: true

test_offline_pipeline:
  stage: test
  image: python:3.12
  script:
    - echo "Running mocked offline tests..."
    - cd backend
    - pip install -r requirements.txt
    - python -c "from database import models; print('Database Schema Validated')"
    # Note: Full E2E testing requires a GitLab runner equipped with Ollama/llama.cpp
