stages:
  - format
  - lint
  - type_check
  - test
  - coverage

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  paths:
    - .cache/pip
    - .npm/
    - frontend/node_modules/
    - backend/venv/

format_backend:
  stage: format
  image: python:3.12
  script:
    - cd backend
    - pip install uv
    - uvx ruff format --check .

lint_backend:
  stage: lint
  image: python:3.12
  script:
    - cd backend
    - pip install uv
    - uvx ruff check .

bandit_security:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install uv
    - uvx bandit -c pyproject.toml -r .

type_check_backend:
  stage: type_check
  image: python:3.12
  script:
    - cd backend
    - pip install uv
    - uv pip install --system mypy pydantic fastapi sqlalchemy
    - mypy .

python_audit:
  stage: test
  image: python:3.12
  script:
    - pip install uv
    - cd backend
    - uv audit

sast_scan:
  stage: test
  image: python:3.12
  script:
    - pip install uv
    - uvx semgrep scan --config auto --error

node_audit:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm audit

commit_lint:
  stage: test
  image: node:20
  script:
    - npm install -g @commitlint/cli @commitlint/config-conventional
    - |
      echo "module.exports = {extends: ['@commitlint/config-conventional']}" > commitlint.config.js
    - commitlint --from HEAD~1

secrets_scan:
  stage: test
  image: zricethezav/gitleaks
  script:
    - gitleaks detect --no-git --source . -v

test_and_coverage_backend:
  stage: test
  image: python:3.12
  script:
    - cd backend
    - pip install uv
    - uv pip install --system -r requirements.txt pytest pytest-cov
    - pytest --cov=./ --cov-fail-under=80

coverage_report:
  stage: coverage
  image: python:3.12
  script:
    - echo "Coverage stage complete."

quality_flake8:
  stage: lint
  image: python:3.12
  script:
    - pip install uv
    - uvx flake8 backend/

quality_radon:
  stage: lint
  image: python:3.12
  script:
    - pip install uv
    - uvx radon cc backend/

quality_pylint:
  stage: lint
  image: python:3.12
  script:
    - cd backend
    - pip install uv
    - uv pip install --system -r requirements.txt pylint
    - pylint --disable=C,R,W .

quality_vulture:
  stage: lint
  image: python:3.12
  script:
    - pip install uv
    - uvx vulture backend/ --min-confidence 100

quality_pyupgrade:
  stage: lint
  image: python:3.12
  script:
    - pip install uv
    - uv pip install --system pyupgrade
    - find backend -name "*.py" | xargs pyupgrade --py312-plus
